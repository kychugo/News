<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="3600" />
  <title>Hong Kong News 香港新聞</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
                   "Noto Sans TC", Roboto, Helvetica, Arial, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
    }

    /* ---- Header ---- */
    header {
      background: linear-gradient(135deg, #c0392b 0%, #922b21 100%);
      color: #fff;
      padding: 1.5rem 1rem 1rem;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,.3);
    }
    header h1 { margin: 0 0 .3rem; font-size: 2rem; letter-spacing: .5px; }
    header .sub {
      margin: 0 0 .8rem;
      font-size: .88rem;
      opacity: .85;
    }
    header .stats {
      display: inline-block;
      background: rgba(255,255,255,.18);
      border-radius: 20px;
      padding: .25rem .9rem;
      font-size: .8rem;
      margin-bottom: .5rem;
    }

    /* ---- Source nav ---- */
    nav {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    nav ul {
      list-style: none;
      margin: 0 auto;
      padding: 0 1rem;
      max-width: 960px;
      display: flex;
      flex-wrap: wrap;
      gap: .25rem;
    }
    nav ul li a {
      display: block;
      padding: .55rem .85rem;
      font-size: .85rem;
      font-weight: 600;
      color: #555;
      text-decoration: none;
      border-bottom: 3px solid transparent;
      transition: color .15s, border-color .15s;
    }
    nav ul li a:hover {
      color: #c0392b;
      border-bottom-color: #c0392b;
    }

    /* ---- Main ---- */
    main {
      max-width: 960px;
      margin: 1.5rem auto 3rem;
      padding: 0 1rem;
    }

    /* ---- Source section ---- */
    .source-section { margin-bottom: 3rem; scroll-margin-top: 48px; }
    .source-header {
      display: flex;
      align-items: baseline;
      gap: .75rem;
      margin-bottom: 1rem;
    }
    .source-title {
      font-size: 1.2rem;
      font-weight: 700;
      border-left: 4px solid #c0392b;
      padding-left: .6rem;
      color: #922b21;
    }
    .source-link {
      font-size: .8rem;
      color: #c0392b;
      text-decoration: none;
      opacity: .8;
    }
    .source-link:hover { opacity: 1; text-decoration: underline; }
    .article-count {
      font-size: .78rem;
      color: #aaa;
      margin-left: auto;
    }

    /* ---- Cards ---- */
    .cards {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    }
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.10);
      display: flex;
      flex-direction: column;
      transition: box-shadow .2s, transform .15s;
    }
    .card:hover {
      box-shadow: 0 6px 18px rgba(0,0,0,.15);
      transform: translateY(-2px);
    }
    .card .headline {
      text-decoration: none;
      color: #1a1a2e;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.45;
      flex: 1;
    }
    .card .headline:hover { color: #c0392b; }
    .card .summary {
      margin-top: .5rem;
      font-size: .84rem;
      color: #555;
      line-height: 1.55;
    }
    .card .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: .75rem;
      flex-wrap: wrap;
      gap: .3rem;
    }
    .card .pub-date {
      font-size: .73rem;
      color: #aaa;
    }
    .card .source-badge {
      font-size: .72rem;
      font-weight: 600;
      color: #fff;
      background: #c0392b;
      border-radius: 4px;
      padding: .15rem .45rem;
      text-decoration: none;
      white-space: nowrap;
    }
    .card .source-badge:hover { background: #922b21; }

    /* ---- Footer ---- */
    footer {
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: .78rem;
      color: #aaa;
      border-top: 1px solid #e5e5e5;
    }
    footer a { color: #c0392b; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>🇭🇰 Hong Kong News 香港新聞</h1>
    <p class="sub">Last updated: 2026-03-08 07:02 (UTC) &mdash; auto-refreshes every hour</p>
    <span class="stats">📰 0 articles from 0 sources</span>
  </header>

  <nav aria-label="News sources">
    <ul>
      
    </ul>
  </nav>

  </main>

  <footer>

  </footer>
</body>
</html>
