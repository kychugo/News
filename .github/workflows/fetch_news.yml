name: Fetch Hong Kong News

on:
  schedule:
    # Run at the top of every hour
    - cron: "0 * * * *"
  # ↓ Allows you to run this workflow manually from the Actions tab in GitHub
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual run (optional)"
        required: false
        default: "Manual refresh"

run-name: "📰 Fetch HK News – ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.reason || 'scheduled' }}"

permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one deployment at a time; cancel any in-progress run
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Hong Kong news and generate HTML
        run: python fetch_news.py

      - name: Commit and push updated news page
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: update HK news [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy only the docs/ folder to GitHub Pages
          path: "./docs"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
