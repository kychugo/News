name: Fetch Hong Kong News

on:
  schedule:
    # Run at the top of every hour
    - cron: "0 * * * *"
  workflow_dispatch: # Allow manual runs from the GitHub UI

permissions:
  contents: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Hong Kong news and generate HTML
        run: python fetch_news.py

      - name: Commit and push updated news page
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: update HK news [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
