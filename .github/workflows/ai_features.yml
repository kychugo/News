name: AI Editorial & News Arena

on:
  schedule:
    # Run 4 times daily at 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 0 * * *"
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual run (optional)"
        required: false
        default: "Manual AI refresh"

run-name: "🤖 AI Editorial & Arena – ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.reason || 'scheduled' }}"

permissions:
  contents: write
  pages: write
  id-token: write

# Only one AI generation run at a time; do not cancel in-progress runs
concurrency:
  group: "ai-features"
  cancel-in-progress: false

jobs:
  generate-ai-content:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate AI Editorial and News Arena content
        env:
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
        run: python ai_features.py

      - name: Regenerate news HTML with updated AI content
        run: python fetch_news.py

      - name: Commit and push updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ai_content.json docs/index.html docs/news.json
          git diff --cached --quiet || git commit -m "chore: update AI editorial & arena [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./docs"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
